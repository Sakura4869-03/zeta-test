<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ZETAプロットをアプリで開く</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px 16px;
      background: #f5f5f5;
      color: #222;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Helvetica Neue",
        "Yu Gothic",
        "Meiryo",
        sans-serif;
    }

    .container {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      padding: 24px 20px;
      background: #fff;
      border-radius: 16px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 24px;
    }

    .description {
      margin: 0 0 20px;
      color: #666;
      line-height: 1.7;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input {
      display: block;
      width: 100%;
      padding: 14px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 16px;
    }

    button,
    .open-link {
      display: block;
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      border: 0;
      border-radius: 10px;
      background: #111;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
    }

    .open-link {
      display: none;
    }

    .result {
      display: none;
      margin-top: 20px;
      padding: 14px;
      background: #f2f2f2;
      border-radius: 10px;
      word-break: break-all;
    }

    .result.is-visible {
      display: block;
    }

    .error {
      margin-top: 12px;
      color: #d00000;
      line-height: 1.5;
    }

    .web-link {
      display: none;
      margin-top: 12px;
      color: #555;
      text-align: center;
    }

    .web-link.is-visible {
      display: block;
    }
  </style>
</head>

<body>
  <main class="container">
    <h1>ZETAプロットをアプリで開く</h1>

    <p class="description">
      Xなどに掲載されているZETAのプロットURLを貼り付けてください。
    </p>

    <label for="plotUrl">ZETAのプロットURL</label>

    <input
      id="plotUrl"
      type="url"
      inputmode="url"
      placeholder="https://zeta-ai.io/ja/plots/..."
      autocomplete="off"
    >

    <button id="createButton" type="button">
      アプリ用リンクを作成
    </button>

    <p id="errorMessage" class="error" aria-live="polite"></p>

    <div id="result" class="result">
      <strong>取得したPlot ID</strong>
      <p id="plotId"></p>
    </div>

    <a id="openLink" class="open-link" href="#">
      ZETAアプリでこのプロットを開く
    </a>

    <a
      id="webLink"
      class="web-link"
      href="#"
      target="_blank"
      rel="noopener noreferrer"
    >
      Web版で開く
    </a>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const plotUrlInput = document.getElementById('plotUrl');
      const createButton = document.getElementById('createButton');
      const errorMessage = document.getElementById('errorMessage');
      const result = document.getElementById('result');
      const plotIdText = document.getElementById('plotId');
      const openLink = document.getElementById('openLink');
      const webLink = document.getElementById('webLink');

      /**
       * 入力された文字列からZETAのPlot IDを取得する
       *
       * 対応例：
       * https://zeta-ai.io/ja/plots/UUID/profile
       * https://zeta-ai.io/ja/plots/UUID/profile?share_id=xxxx
       * zeta://ja/plots/UUID/profile
       * UUIDのみ
       */
      function extractPlotId(value) {
        const input = value.trim();

        const uuidPattern =
          /[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}/i;

        const match = input.match(uuidPattern);

        return match ? match[0] : null;
      }

      function resetResult() {
        errorMessage.textContent = '';
        result.classList.remove('is-visible');
        openLink.style.display = 'none';
        webLink.classList.remove('is-visible');
        openLink.setAttribute('href', '#');
        webLink.setAttribute('href', '#');
      }

      function createLinks() {
        resetResult();

        const inputValue = plotUrlInput.value;
        const plotId = extractPlotId(inputValue);

        if (!inputValue.trim()) {
          errorMessage.textContent =
            'ZETAのプロットURLを入力してください。';
          return;
        }

        if (!plotId) {
          errorMessage.textContent =
            'Plot IDを取得できませんでした。ZETAのプロットURLを確認してください。';
          return;
        }

        const appUrl =
          'zeta://ja/plots/' + encodeURIComponent(plotId) + '/profile';

        const browserUrl =
          'https://zeta-ai.io/ja/plots/' +
          encodeURIComponent(plotId) +
          '/profile';

        plotIdText.textContent = plotId;

        openLink.setAttribute('href', appUrl);
        webLink.setAttribute('href', browserUrl);

        result.classList.add('is-visible');
        openLink.style.display = 'block';
        webLink.classList.add('is-visible');
      }

      createButton.addEventListener('click', createLinks);

      plotUrlInput.addEventListener('keydown', function (event) {
        if (event.key === 'Enter') {
          createLinks();
        }
      });
    });
  </script>
</body>
</html>
