<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ZETAプロットを開く</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px 16px;
      background: #f5f5f5;
      color: #222;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Helvetica Neue",
        "Yu Gothic",
        Meiryo,
        sans-serif;
    }

    .container {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      padding: 24px 20px;
      background: #fff;
      border-radius: 16px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 24px;
    }

    .description {
      margin: 0 0 20px;
      color: #666;
      line-height: 1.7;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input {
      display: block;
      width: 100%;
      padding: 14px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 16px;
    }

    button,
    .button {
      display: block;
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      border: 0;
      border-radius: 10px;
      background: #111;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
    }

    .button {
      display: none;
    }

    .button.is-visible {
      display: block;
    }

    .web-button {
      background: #e8e8e8;
      color: #222;
    }

    .result {
      display: none;
      margin-top: 20px;
      padding: 14px;
      background: #f2f2f2;
      border-radius: 10px;
      word-break: break-all;
    }

    .result.is-visible {
      display: block;
    }

    .error {
      margin-top: 14px;
      color: #d00000;
      line-height: 1.6;
    }

    .divider {
      margin: 28px 0;
      border: 0;
      border-top: 1px solid #ddd;
    }

    .manual-title {
      margin: 0 0 12px;
      font-size: 18px;
    }
  </style>
</head>

<body>
  <main class="container">
    <h1>ZETAプロットを開く</h1>

    <p class="description">
      指定されたプロットをZETAアプリで開きます。
    </p>

    <div id="result" class="result">
      <strong>Plot ID</strong>
      <p id="plotIdText"></p>
    </div>

    <a id="appLink" class="button" href="#">
      ZETAアプリで開く
    </a>

    <a
      id="webLink"
      class="button web-button"
      href="#"
      target="_blank"
      rel="noopener noreferrer"
    >
      Web版で開く
    </a>

    <p id="errorMessage" class="error" aria-live="polite"></p>

    <hr class="divider">

    <h2 class="manual-title">別のプロットを開く</h2>

    <label for="plotUrl">
      ZETAの共有URLまたはPlot ID
    </label>

    <input
      id="plotUrl"
      type="text"
      inputmode="url"
      placeholder="https://zeta-ai.io/ja/plots/..."
      autocomplete="off"
    >

    <button id="createButton" type="button">
      リンクを作成
    </button>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const plotUrlInput = document.getElementById('plotUrl');
      const createButton = document.getElementById('createButton');

      const result = document.getElementById('result');
      const plotIdText = document.getElementById('plotIdText');
      const appLink = document.getElementById('appLink');
      const webLink = document.getElementById('webLink');
      const errorMessage = document.getElementById('errorMessage');

      const uuidPattern =
        /[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}/i;

      /**
       * URLや文字列からPlot IDを取得する
       */
      function extractPlotId(value) {
        if (!value) return null;

        const match = value.trim().match(uuidPattern);

        return match ? match[0] : null;
      }

      /**
       * Plot IDからアプリ用・Web用リンクを生成する
       */
      function displayLinks(plotId) {
        const encodedPlotId = encodeURIComponent(plotId);

        const appUrl =
          'zeta://ja/plots/' + encodedPlotId + '/profile';

        const webUrl =
          'https://zeta-ai.io/ja/plots/' +
          encodedPlotId +
          '/profile';

        plotIdText.textContent = plotId;

        appLink.href = appUrl;
        webLink.href = webUrl;

        result.classList.add('is-visible');
        appLink.classList.add('is-visible');
        webLink.classList.add('is-visible');

        errorMessage.textContent = '';
      }

      /**
       * 表示を初期化する
       */
      function resetLinks() {
        result.classList.remove('is-visible');
        appLink.classList.remove('is-visible');
        webLink.classList.remove('is-visible');

        appLink.href = '#';
        webLink.href = '#';

        errorMessage.textContent = '';
      }

      /**
       * 入力内容からリンクを生成する
       */
      function createLinksFromInput() {
        resetLinks();

        const inputValue = plotUrlInput.value.trim();

        if (!inputValue) {
          errorMessage.textContent =
            'ZETAの共有URLまたはPlot IDを入力してください。';
          return;
        }

        const plotId = extractPlotId(inputValue);

        if (!plotId) {
          errorMessage.textContent =
            'Plot IDを取得できませんでした。URLを確認してください。';
          return;
        }

        displayLinks(plotId);

        // 作成したIDをURLにも反映
        const newUrl =
          window.location.pathname +
          '?id=' +
          encodeURIComponent(plotId);

        window.history.replaceState(null, '', newUrl);
      }

      createButton.addEventListener('click', createLinksFromInput);

      plotUrlInput.addEventListener('keydown', function (event) {
        if (event.key === 'Enter') {
          createLinksFromInput();
        }
      });

      /**
       * ページURLの ?id= または ?url= を読み取る
       */
      const params = new URLSearchParams(window.location.search);

      const idParameter = params.get('id');
      const urlParameter = params.get('url');

      const initialPlotId =
        extractPlotId(idParameter) ||
        extractPlotId(urlParameter);

      if (initialPlotId) {
        displayLinks(initialPlotId);
      } else if (idParameter || urlParameter) {
        errorMessage.textContent =
          'URLに含まれるPlot IDを取得できませんでした。';
      }
    });
  </script>
</body>
</html>
