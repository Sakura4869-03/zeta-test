<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZETA App Launcher</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:24px;
    background:#f5f5f5;
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
}

.container{
    max-width:600px;
    margin:auto;
    background:#fff;
    padding:24px;
    border-radius:16px;
}

h1{
    margin-top:0;
}

p{
    color:#666;
    line-height:1.7;
}

input{
    width:100%;
    padding:14px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:10px;
}

.button-group{
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-top:16px;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:10px;
    font-size:17px;
    cursor:pointer;
}

#openButton{
    background:#111;
    color:#fff;
}

#pasteButton{
    background:#e8e8e8;
    color:#111;
}

#error{
    margin-top:14px;
    color:#d60000;
}

#status{
    margin-top:14px;
    color:#008000;
}
</style>

</head>
<body>

<div class="container">

<h1>ZETAプロットを開く</h1>

<p>
ZETAの共有URLを貼り付けて<br>
「ZETAアプリで開く」を押してください。
</p>

<input
id="plotUrl"
type="text"
placeholder="https://zeta-ai.io/ja/plots/...">

<div class="button-group">
<button id="pasteButton">
📋 ペースト
</button>
<button id="openButton">
🚀 ZETAアプリで開く
</button>
</div>

<div id="status"></div>
<div id="error"></div>

</div>

<script>

const input=document.getElementById("plotUrl");
const button=document.getElementById("openButton");
const pasteButton=document.getElementById("pasteButton");
const error=document.getElementById("error");
const status=document.getElementById("status");

button.addEventListener("click",openPlot);
pasteButton.addEventListener("click",pasteClipboard);
input.addEventListener("keydown",function(e){
    if(e.key==="Enter"){
        openPlot();
    }
});

function openPlot(){

    error.textContent="";
    status.textContent="";

    const text=input.value.trim();

    if(text===""){
        error.textContent="URLを入力してください";
        return;
    }

    const match=text.match(
        /[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}/i
    );

    if(!match){
        error.textContent="ZETAの共有URLではありません";
        return;
    }

    const plotId=match[0];

    const appUrl=
        "zeta://ja/plots/"+plotId+"/profile";

    status.textContent="アプリを起動しています...";

    window.location.href=appUrl;

}
async function pasteClipboard(){

    error.textContent="";
    status.textContent="";

    if(!navigator.clipboard){
        error.textContent="このブラウザではペースト機能に対応していません";
        return;
    }

    try{

        const text=await navigator.clipboard.readText();

        if(!text){
            error.textContent="クリップボードが空です";
            return;
        }

        input.value=text;

        status.textContent="URLを貼り付けました";

    }catch(e){

        error.textContent="クリップボードを読み取れませんでした";

    }

}

</script>

</body>
</html>
